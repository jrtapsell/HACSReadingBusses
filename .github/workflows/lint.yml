name: Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  linting:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint
      
      - name: Format check with black
        run: black --check custom_components/reading_bus tests
        continue-on-error: true
      
      - name: Import sort check with isort
        run: isort --check-only custom_components/reading_bus tests
        continue-on-error: true
      
      - name: Lint with flake8
        run: flake8 custom_components/reading_bus tests --max-line-length=127 --extend-ignore=E203,W503
        continue-on-error: true
